[pytest]
asyncio_mode = auto
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    integration: requires PostgreSQL (TEST_DATABASE_URL)
addopts = -ra --strict-markers
filterwarnings =
    ignore::DeprecationWarning

[coverage:run]
source = app
branch = True
omit =
    app/scripts/*
    app/main.py

[coverage:report]
show_missing = True
skip_covered = False
fail_under = 0
